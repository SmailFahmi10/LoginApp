server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enrutamiento SPA: cualquier ruta que no sea un fichero estático
    # cae en index.html y Angular gestiona la navegación
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeceras de caché para los estáticos con hash en el nombre (chunks de Angular)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
