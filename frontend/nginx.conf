# ─────────────────────────────────────────────────────────────────────────────
# Nginx — servidor de producción para login.smailfahmi.com
#
# Arquitectura: Cloudflare → cloudflared tunnel → este Nginx (puerto 80)
#
# Responsabilidades:
#   1. Servir la SPA de Angular (archivos estáticos)
#   2. Hacer de reverse proxy para /api/* → backend:8080
#   3. Añadir cabeceras de seguridad HTTP
#   4. Pasar la IP real del visitante desde las cabeceras de Cloudflare
# ─────────────────────────────────────────────────────────────────────────────

# Pasar la IP real del usuario desde las cabeceras de Cloudflare.
# Cloudflare añade CF-Connecting-IP con la IP del cliente original.
# Sin esto, el backend solo vería la IP del túnel (127.0.0.1).
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Cabeceras de seguridad HTTP ─────────────────────────────────────────
    # Aplicadas a todas las respuestas del servidor.

    # Evitar que el navegador "adivine" el tipo MIME (sniffing)
    add_header X-Content-Type-Options "nosniff" always;

    # No permitir que la página se cargue dentro de un <iframe>
    add_header X-Frame-Options "DENY" always;

    # Activar filtro XSS del navegador (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Controlar qué información se incluye en la cabecera Referer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    # 'unsafe-inline' en script-src es necesario para Angular Material MDC,
    # que genera event handlers inline en tiempo de ejecución.
    # La protección real contra XSS en una SPA Angular viene del framework mismo.
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self';" always;

    # Permissions Policy: desactivar APIs no necesarias
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS: indicar al navegador que SIEMPRE use HTTPS para este dominio.
    # Cloudflare gestiona el TLS, pero añadirlo aquí garantiza que los clientes
    # que lleguen directamente también usen HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Proxy inverso para el backend ────────────────────────────────────────
    # Todas las peticiones a /api/* se redirigen al contenedor Spring Boot.
    # Esto elimina los problemas CORS: frontend y API comparten el mismo origen.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;

        # Pasar cabeceras importantes al backend
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Timeouts razonables para una API de autenticación
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Deshabilitar buffering para respuestas de streaming (si aplica en el futuro)
        proxy_buffering off;
    }

    # ─── Enrutamiento SPA ─────────────────────────────────────────────────────
    # Angular gestiona sus propias rutas en el cliente.
    # Cualquier ruta que no sea un fichero estático cae en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Caché agresiva para estáticos con hash ───────────────────────────────
    # Angular genera nombres de fichero con hash (main.abc123.js) en producción.
    # Es seguro cachear durante 1 año: si cambia el contenido, cambia el nombre.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Suprimir logs de favicon ─────────────────────────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }
}
