<!-- ============================================================
     Dashboard - Econocom
     Pantalla post-login
     ============================================================ -->

<div class="dashboard">

  <header class="dashboard__header">
    <img
      class="dashboard__logo"
      src="assets/images/logos/Econocom.svg"
      alt="Econocom"
    />
    <button
      mat-stroked-button
      class="dashboard__logout-btn"
      (click)="logout()"
    >
      <mat-icon>logout</mat-icon>
      Cerrar sesión
    </button>
  </header>

  <main class="dashboard__main">
    <mat-icon class="dashboard__icon">check_circle</mat-icon>
    <h1 class="dashboard__title heading--2">¡Acceso correcto!</h1>
    <p class="dashboard__text">Has iniciado sesión correctamente en la plataforma Econocom.</p>
  </main>

</div>
