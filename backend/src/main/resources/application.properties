# ==========================================
# Configuración del servidor
# ==========================================
server.port=8080

# ==========================================
# Configuración de logging
# ==========================================
# Fichero de log (se crea en la raíz del proyecto al arrancar)
logging.file.name=logs/auth-api.log

# Tamaño máximo de cada fichero antes de rotar (evita que crezca sin límite)
logging.logback.rollingpolicy.max-file-size=10MB

# Número de ficheros rotados que se conservan (10 días de histórico)
logging.logback.rollingpolicy.max-history=10

# Nivel raíz: INFO en producción (WARN, ERROR, INFO, DEBUG, TRACE)
logging.level.root=INFO

# Nivel detallado para las clases propias del proyecto
logging.level.com.econocom.authapi=DEBUG

# Reducir el ruido de frameworks internos
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Formato del log en consola (timestamp · nivel · hilo · clase · mensaje)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Mismo formato en el fichero
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# Configuración JWT
# ==========================================
# Clave secreta para firmar los tokens JWT (Base64-encoded, mínimo 256 bits)
jwt.secret=RWNvbm9jb21QcnVlYmFUZWNuaWNhU2VjcmV0S2V5MjAyNFNlY3VyZQ==
# Tiempo de expiración del token en milisegundos (1 hora = 3600000 ms)
jwt.expiration=3600000
# Tiempo de gracia para refresco del token en milisegundos (5 minutos antes de expirar)
jwt.refresh-window=300000

# ==========================================
# Configuración SSO simulado
# ==========================================
sso.client-id=econocom-app-001
sso.redirect-uri=http://localhost:4200/sso/callback
sso.provider-url=http://localhost:8080/api/auth/sso/provider
sso.valid-code=AUTH_CODE_ECONOCOM_2024
