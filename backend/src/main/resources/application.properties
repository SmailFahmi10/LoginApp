# ==========================================
# Configuración del servidor
# ==========================================
server.port=8080

# ==========================================
# Configuración de logging
# ==========================================
logging.file.name=logs/auth-api.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10
logging.level.root=INFO
logging.level.com.econocom.authapi=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# Configuración JWT
# ==========================================
# En producción sobreescribir JWT_SECRET con un secreto fuerte (min 256 bits Base64)
jwt.secret=${JWT_SECRET:RWNvbm9jb21QcnVlYmFUZWNuaWNhU2VjcmV0S2V5MjAyNFNlY3VyZQ==}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-window=300000

# ==========================================
# Configuración CORS
# ==========================================
# Orígenes permitidos separados por coma.
# Dev: http://localhost:4200  |  Prod: https://login.smailfahmi.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ==========================================
# Configuración SSO simulado
# ==========================================
sso.client-id=econocom-app-001
# URI de callback del frontend (ajustar en producción)
sso.redirect-uri=${SSO_REDIRECT_URI:http://localhost:4200/sso/callback}
# URL del proveedor SSO simulado (apunta al propio backend)
sso.provider-url=${SSO_PROVIDER_URL:http://localhost:8080/api/auth/sso/provider}
sso.valid-code=AUTH_CODE_ECONOCOM_2024
